apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
  annotations:
    # k3s' Traefik HelmChartConfig (deploy/traefik/base/entrypoints.yaml)
    # publishes a `grafana` entrypoint on host port 3000. Pin the router
    # so this Ingress only answers there and never collides with
    # movies-api on :80 or Prometheus on :9090. Per repo memory: every
    # Ingress declares exactly one entrypoint.
    traefik.ingress.kubernetes.io/router.entrypoints: grafana
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
