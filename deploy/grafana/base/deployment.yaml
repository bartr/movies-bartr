apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
      annotations:
        # Force a rollout when grafana.ini or the datasource ConfigMap
        # change (kustomize hashes them via configMapGenerator on the
        # generated overlays — these are the static ones, kept stable
        # so the annotation triggers reload only when their data
        # actually changes via `kubectl apply`).
        config.movies/grafana-ini: v1
        config.movies/datasources: v1
    spec:
      serviceAccountName: grafana
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: grafana/grafana:11.3.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            # GF_SECURITY_ADMIN_PASSWORD lives here. The dev overlay
            # creates this Secret via secretGenerator with the value
            # `Passw0rd`; non-dev overlays must provide their own.
            - secretRef:
                name: grafana-admin
          env:
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
            - name: GF_PATHS_DATA
              value: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            # Grafana writes plugin/cache files under /var/lib/grafana
            # and re-renders /etc/grafana/grafana.ini at boot, so we
            # cannot enable readOnlyRootFilesystem without also mounting
            # writable emptyDirs over /tmp, /etc/grafana, and the
            # plugin cache. Kept off for now; revisit if/when we move
            # to the bitnami hardened image.
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: grafana-ini
              mountPath: /etc/grafana/grafana.ini
              subPath: grafana.ini
              readOnly: true
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: grafana-ini
          configMap:
            name: grafana-ini
            items:
              - key: grafana.ini
                path: grafana.ini
        - name: datasources
          configMap:
            name: grafana-datasources
