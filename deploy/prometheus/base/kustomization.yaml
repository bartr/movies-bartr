apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# In-cluster Prometheus instance, reconciled by the operator from
# deploy/prometheus-operator. Selects ServiceMonitors and PodMonitors
# labeled `monitoring.coreos.com/instance: prometheus` across all
# namespaces — that's the label on the movies-api ServiceMonitor.
namespace: monitoring

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - rbac.yaml
  - prometheus.yaml
  - service.yaml
