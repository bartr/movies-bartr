apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-bootstrap
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: bootstrap
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/component: bootstrap
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          # curlimages/curl ships curl + a tiny POSIX shell and runs as
          # the non-root `curl_user` (uid 100). No package-install hop,
          # no root needed (the previous alpine:3.20 + apk attempt
          # CrashLoopBackOff'd because apk needs root). Dashboard
          # wrapping is done by string concatenation, so we don't need
          # jq either.
          image: curlimages/curl:8.10.1
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: grafana-admin
          env:
            - name: GRAFANA_URL
              value: http://grafana.monitoring.svc:3000
            - name: DASHBOARD_UID
              value: movies-api
          command: ["/bin/sh", "-eu", "-c"]
          args:
            - |
              echo "[bootstrap] waiting for Grafana at $GRAFANA_URL ..."
              for i in $(seq 1 60); do
                if curl -fsS "$GRAFANA_URL/api/health" >/dev/null 2>&1; then
                  echo "[bootstrap] grafana is up"
                  break
                fi
                sleep 2
              done
              curl -fsS "$GRAFANA_URL/api/health"; echo

              echo "[bootstrap] building dashboard payload for uid=${DASHBOARD_UID} ..."
              # Wrap the raw dashboard JSON in the {dashboard, overwrite,
              # message} envelope expected by /api/dashboards/db. The
              # dashboard JSON already carries uid=movies-api and no id,
              # which is exactly what Grafana wants for an idempotent
              # create-or-update keyed by uid.
              {
                printf '{"dashboard":'
                cat /dashboards/movies-api.json
                printf ',"overwrite":true,"message":"bootstrap"}'
              } > /tmp/payload.json
              echo "[bootstrap] payload bytes: $(wc -c < /tmp/payload.json)"

              echo "[bootstrap] POST /api/dashboards/db ..."
              RESP=$(curl -fsS -u "admin:${GF_SECURITY_ADMIN_PASSWORD}" \
                -H 'Content-Type: application/json' \
                -X POST "$GRAFANA_URL/api/dashboards/db" \
                --data-binary @/tmp/payload.json)
              echo "[bootstrap] dashboard response: $RESP"

              echo "[bootstrap] starring dashboard for admin ..."
              # Grafana 9+ supports starring by uid — preferred so we
              # never have to parse the numeric id out of the response.
              curl -fsS -u "admin:${GF_SECURITY_ADMIN_PASSWORD}" \
                -X POST "$GRAFANA_URL/api/user/stars/dashboard/uid/${DASHBOARD_UID}" \
                && echo "[bootstrap] starred ${DASHBOARD_UID}"

              echo "[bootstrap] ensuring 'reader' user exists ..."
              # Anonymous Grafana sessions share a synthetic identity
              # and cannot persist personal stars. To give a "reader"
              # persona a real Starred entry, create a Viewer-role user
              # via /api/admin/users (idempotent — 412 means it already
              # exists) and star the dashboard for them via basic auth.
              CREATE_BODY='{"name":"reader","login":"reader","password":"Passw0rd","email":"reader@local"}'
              if curl -fsS -u "admin:${GF_SECURITY_ADMIN_PASSWORD}" \
                  -H 'Content-Type: application/json' \
                  -X POST "$GRAFANA_URL/api/admin/users" \
                  -d "$CREATE_BODY" >/dev/null 2>&1; then
                echo "[bootstrap] created reader user"
              else
                echo "[bootstrap] reader user already exists"
              fi
              # New users default to org role Viewer in OSS Grafana via
              # /api/admin/users; ensure that's still the case in case a
              # previous run upgraded them.
              READER_ID=$(curl -fsS -u "admin:${GF_SECURITY_ADMIN_PASSWORD}" \
                "$GRAFANA_URL/api/users/lookup?loginOrEmail=reader" \
                | sed -n 's/.*"id":\([0-9][0-9]*\).*/\1/p')
              echo "[bootstrap] reader user id: ${READER_ID}"
              curl -fsS -u "admin:${GF_SECURITY_ADMIN_PASSWORD}" \
                -H 'Content-Type: application/json' \
                -X PATCH "$GRAFANA_URL/api/org/users/${READER_ID}" \
                -d '{"role":"Viewer"}' >/dev/null \
                && echo "[bootstrap] reader role pinned to Viewer"

              echo "[bootstrap] starring dashboard for reader ..."
              curl -fsS -u "reader:Passw0rd" \
                -X POST "$GRAFANA_URL/api/user/stars/dashboard/uid/${DASHBOARD_UID}" \
                && echo "[bootstrap] starred ${DASHBOARD_UID} for reader"

              echo "[bootstrap] setting org home dashboard ..."
              # Stars are per-user — anonymous viewers have an empty star
              # list and can't be starred (no user record). To make the
              # dashboard visible to *everyone* (admin + anon) without
              # logging in, also set it as the org's default home
              # dashboard via PUT /api/org/preferences. This is the
              # landing page Grafana renders at `/` for any session that
              # has not overridden its personal home dashboard.
              curl -fsS -u "admin:${GF_SECURITY_ADMIN_PASSWORD}" \
                -H 'Content-Type: application/json' \
                -X PUT "$GRAFANA_URL/api/org/preferences" \
                -d "{\"homeDashboardUID\":\"${DASHBOARD_UID}\"}" \
                && echo "[bootstrap] org home dashboard set to ${DASHBOARD_UID}"

              echo "[bootstrap] done."
          volumeMounts:
            - name: dashboard
              mountPath: /dashboards
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: dashboard
          configMap:
            name: grafana-dashboard-movies-api
        - name: tmp
          emptyDir: {}
