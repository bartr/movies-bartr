apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  # Mounted at /etc/grafana/provisioning/datasources/. Grafana picks up
  # any *.yaml here at boot and creates a managed datasource. Marking it
  # editable: false locks anonymous viewers (and even the admin via UI)
  # out of repointing it; it can still be replaced by re-applying this
  # ConfigMap.
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc:9090
        isDefault: true
        editable: false
        jsonData:
          timeInterval: "30s"
