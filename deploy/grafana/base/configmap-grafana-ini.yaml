apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-ini
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  # admin_password is taken from the env var that envFrom: secretRef:
  # grafana-admin injects (GF_SECURITY_ADMIN_PASSWORD). Anonymous Viewer
  # is enabled for the dev overlay (spec §7.3); flip [auth.anonymous]
  # off in any non-dev overlay.
  grafana.ini: |
    [server]
    root_url = %(protocol)s://%(domain)s:%(http_port)s/
    serve_from_sub_path = false

    [analytics]
    reporting_enabled = false
    check_for_updates = false

    [security]
    admin_user = admin
    # admin_password value is overridden at runtime by the
    # GF_SECURITY_ADMIN_PASSWORD env var (envFrom secret grafana-admin).
    disable_initial_admin_creation = false

    [users]
    allow_sign_up = false

    [auth]
    disable_login_form = false

    [auth.anonymous]
    enabled = true
    org_name = Main Org.
    org_role = Viewer

    [log]
    mode = console
    level = info
