apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prometheus Operator install. We pin the upstream bundle to a stable
# release; Kustomize fetches it directly so no Helm and no vendored YAML
# file is needed in the repo. The bundle ships:
#   - CRDs (alertmanagerconfigs / alertmanagers / podmonitors / probes /
#     prometheusagents / prometheuses / prometheusrules / scrapeconfigs /
#     servicemonitors / thanosrulers).monitoring.coreos.com
#   - ServiceAccount, ClusterRole + ClusterRoleBinding, Deployment, and
#     Service for the operator itself, all in the `default` namespace
#     (upstream default — we do not relocate it).
#
# Bump this URL when upgrading the operator.
resources:
  - https://github.com/prometheus-operator/prometheus-operator/releases/download/v0.74.0/bundle.yaml
