apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
spec:
  replicas: 1
  serviceAccountName: prometheus
  scrapeInterval: 30s
  evaluationInterval: 30s
  retention: 7d
  externalLabels:
    cluster: z01
  # Enable the admin TSDB API so we can tombstone stale series with
  # /api/v1/admin/tsdb/delete_series + clean_tombstones. Required on
  # the local dev cluster only — see repo memory.
  enableAdminAPI: true
  # Discover any ServiceMonitor in any namespace whose labels include
  # `monitoring.coreos.com/instance: prometheus` — that's the label this
  # repo's movies-api ServiceMonitor carries. Same selector for rules.
  serviceMonitorNamespaceSelector: {}
  serviceMonitorSelector:
    matchLabels:
      monitoring.coreos.com/instance: prometheus
  podMonitorNamespaceSelector: {}
  podMonitorSelector:
    matchLabels:
      monitoring.coreos.com/instance: prometheus
  ruleNamespaceSelector: {}
  ruleSelector: {}
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000
    seccompProfile:
      type: RuntimeDefault
  # Persist scrape data across pod restarts via a PVC. k3s ships
  # `local-path` as the default StorageClass — single-node only,
  # node-bound, ReadWriteOnce, which is exactly what a Prometheus
  # StatefulSet wants. The operator turns this template into
  # prometheus-prometheus-db-prometheus-prometheus-0.
  storage:
    volumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
