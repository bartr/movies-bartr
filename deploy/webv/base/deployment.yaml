apiVersion: apps/v1
kind: Deployment
metadata:
  name: webv
  namespace: movies
  labels:
    app.kubernetes.io/name: webv
    app.kubernetes.io/component: load-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: webv
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webv
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webv
          # Reuses the movies-api image — same Dockerfile bakes /webv
          # alongside /movies-api plus the suites at /webv-suites.
          image: movies-api:0.9.0
          imagePullPolicy: IfNotPresent
          command: ["/webv"]
          args:
            - --url=http://movies-api.movies.svc.cluster.local:8080
            - --files=/webv-suites/benchmark.yaml
            - --loop
            - --threads=2
            # Tuned to land sustained throughput just over the spec
            # §10.4 target of 500 RPS. The kernel timer slice on the
            # host quantizes Go time.Sleep to ~1 ms, which means
            # single-thread RPS jumps in big steps (800 / 428 / 293)
            # with no value near 500. Two threads at sleep=3ms give
            # ~584 RPS sustained, 0% 5xx, comfortably above target
            # without saturating the 500m-CPU pod. See
            # docs/PERFORMANCE.md for the math.
            - --sleep=3ms
            - --verbose
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
