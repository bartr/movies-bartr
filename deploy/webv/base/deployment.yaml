apiVersion: apps/v1
kind: Deployment
metadata:
  name: webv
  namespace: movies
  labels:
    app.kubernetes.io/name: webv
    app.kubernetes.io/component: load-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: webv
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webv
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webv
          # Reuses the movies-api image — same Dockerfile bakes /webv
          # alongside /movies-api plus the suites at /webv-suites.
          image: movies-api:0.9.0
          imagePullPolicy: IfNotPresent
          command: ["/webv"]
          args:
            - --url=http://movies-api.movies.svc.cluster.local:8080
            - --files=/webv-suites/benchmark.yaml
            - --loop
            - --threads=1
            - --sleep=1
            - --verbose
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
