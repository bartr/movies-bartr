apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  # k3s default StorageClass is `local-path` — single-node, node-bound,
  # ReadWriteOnce. Fine for a single-replica Grafana with `Recreate`
  # strategy. The PVC survives pod restarts and `make grafana-deploy`
  # cycles; only `make grafana-undeploy` (which deletes the PVC because
  # kustomize tracks it) wipes saved dashboards + the SQLite DB.
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
